name: run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  Run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: Install dependencies
        run: npm ci
      - name: Run app
        run: npm run start
        env:
          MERGE_DEPENDABOT__TOKEN: ${{ secrets.MERGE_DEPENDABOT__TOKEN }}
          MERGE_DEPENDABOT__MAX_ATTEMPTS: 3
